// ===== HELPER: localStorage =====
function loadState(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function saveState(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function Badge({color, children}) {
  return e("span", {style: {display:"inline-block", padding:"2px 7px", borderRadius:4, fontSize:10, fontWeight:700, letterSpacing:"0.5px", textTransform:"uppercase", background:color+"22", color:color, border:"1px solid "+color+"44"}}, children);
}

function Section({title, icon, children, isOpen, onToggle, accent, count}) {
  const ac = accent || C.accent;
  return e("div", {style: {marginBottom:10, borderRadius:10, border:"1px solid "+(isOpen?ac+"44":C.border), background:C.card, overflow:"hidden"}},
    e("button", {onClick:onToggle, style:{width:"100%", display:"flex", alignItems:"center", gap:9, padding:"13px 14px", background:"none", border:"none", color:C.text, cursor:"pointer", textAlign:"left", fontSize:14, fontWeight:600, fontFamily:"inherit"}},
      e("span", {style:{fontSize:17}}, icon),
      e("span", {style:{flex:1}}, title),
      count != null && e("span", {style:{fontSize:11, color:C.textMuted, marginRight:8}}, count + " exercises"),
      e("span", {style:{transform:isOpen?"rotate(180deg)":"rotate(0deg)", transition:"transform 0.2s", fontSize:11, color:C.textMuted}}, "▼")
    ),
    isOpen && e("div", {style:{padding:"0 14px 14px", lineHeight:1.6}}, children)
  );
}

      e("div", {style:{display:"flex", alignItems:"center", justifyContent:"space-between", gap:7, flexWrap:"wrap"}},
        e("div", {style:{display:"flex", alignItems:"center", gap:7, flexWrap:"wrap", flex:1}},
          e("span", {style:{fontWeight:600, fontSize:13, color: unavailable?C.danger:C.text}}, name),
          ex.safety === "caution" && e(Badge, {color:C.warning}, "MODIFIED"),
          ex.phase != null && phase < ex.phase && e(Badge, {color:C.textMuted}, "Wk "+(ex.phase*2+1)+"+"),
          unavailable && e(Badge, {color:C.danger}, "NO EQUIP")
        ),

          !isExpanded && e("span", {style:{fontSize:11, color:C.textDim}}, s[0]+"×"+s[1]),
          e("span", {style:{fontSize:10, color:C.accent}}, isExpanded ? "▲" : "ⓘ")
        )
      )
    ),

function RestTimer({seconds, onClose}) {
  const [remaining, setRemaining] = useState(seconds);
  const intervalRef = useRef(null);

  useEffect(function() {
    intervalRef.current = setInterval(function() {
      setRemaining(function(r) {
        if (r <= 1) { clearInterval(intervalRef.current); return 0; }
        return r - 1;
      });
    }, 1000);
    return function() { clearInterval(intervalRef.current); };
  }, [seconds]);

  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;

  return e("div", {className:"rest-timer"},
    e("div", {className:"time", style: remaining === 0 ? {color:C.safe, animation:"pulse 1s infinite"} : {}},
      remaining === 0 ? "GO!" : (mins > 0 ? mins+":" : "") + (secs < 10 && mins > 0 ? "0" : "") + secs
    ),
    e("button", {onClick:onClose}, "✕ Close")
  );
}

        e(Section, {title:"Progressive Overload Rules", icon:"📈", isOpen:!!openSections["overload"], onToggle:function(){ toggleSection("overload"); }},
          e("div", {style:{fontSize:12, color:C.textDim, lineHeight:1.7}},
            [{t:"Load Progression", d:"Add 2.5kg when all reps/sets hit target RPE across 2 sessions. Single-leg: 5% increments."}, {t:"Volume Accumulation", d:"Add 1 set/exercise/week over 3-week wave (3×10 → 4×10 → 5×10), then deload."}, {t:"Tempo Manipulation", d:"4-second eccentric on any exercise. Increases TUT by 60-100%."}, {t:"Rest-Pause Sets", d:"8 reps → rack 15s → 3-4 more → rack 15s → 2-3 more. Comparable hypertrophy in less time."}, {t:"Mechanical Advantage Drop Sets", d:"Cycle harder→easier variations (incline→flat→decline press). Max stimulus from limited exercises."}, {t:"Density Training", d:"Cut 15 seconds off rest every 2 weeks. Same work in less time = progressive overload."}].map(function(rule,i) {
              return e("div", {key:"ol-"+i, style:{marginBottom:8}}, e("span", {style:{fontWeight:700, color:C.accent}}, rule.t+": "), rule.d);
            })
          )
        )
      );
      break;
  }

  return e("div", {style:{maxWidth:500, margin:"0 auto", padding:"0 10px 80px", minHeight:"100vh", background:C.bg}},
    e("div", {style:{padding:"24px 0 16px", textAlign:"center"}},
      e("h1", {style:{fontSize:22, fontWeight:800, letterSpacing:"-0.5px", color:C.white}}, "NWB Workout Plan"),
      e("div", {style:{fontSize:11, color:C.textMuted, marginTop:4}}, "MRI-Adjusted PPL • Left Hip NWB • 6 Weeks")
    ),
    e("div", {style:{display:"flex", gap:4, marginBottom:12}},
      PHASES.map(function(p, i) {
        return e("div", {key:i, onClick:function(){ setPhase(i); }, style:{flex:1, padding:"8px 4px", borderRadius:8, background:phase===i?p.color+"22":C.card, border:"2px solid "+(phase===i?p.color:C.border), textAlign:"center", cursor:"pointer", transition:"all 0.2s"}},
          e("div", {style:{fontSize:10, fontWeight:800, color:p.color}}, "WK "+p.weeks),
          e("div", {style:{fontSize:9, color:phase===i?C.text:C.textMuted, marginTop:2}}, p.name)
        );
      })
    ),
    e("div", {style:{display:"flex", gap:2, marginBottom:16, overflowX:"auto", paddingBottom:4}},
      tabs.map(function(t, i) {
        var isTodayTab = i === 0;
        return e("button", {key:t, onClick:function(){ setTab(i); }, style:{flex:1, minWidth:60, padding:"10px 4px", background:tab===i?(isTodayTab?sched[selectedDay].c:C.accent)+"22":"none", border:"1px solid "+(tab===i?(isTodayTab?sched[selectedDay].c:C.accent):C.border), color:tab===i?(isTodayTab?sched[selectedDay].c:C.accent):C.textMuted, borderRadius:8, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit"}}, t);
      })
    ),
    content,
    e("div", {style:{marginTop:20, padding:12, borderRadius:10, background:C.dangerBg, border:"1px solid "+C.dangerBorder, fontSize:11, textAlign:"center", color:C.danger}},
      e("b", null, "Medical Disclaimer: "), "Confirm all exercises with your PT/Orthopedic Surgeon. Groin pain = Absolute Stop."
    ),
    timer && e(RestTimer, {seconds:timer, onClose:function(){ setTimer(null); }})
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App));
  </script>
</body>
