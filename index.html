function Badge({color,children}){
  return e("span",{style:{display:"inline-block",padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",background:color+"22",color:color,border:"1px solid "+color+"44"}},children);
}

function Section({title,icon,children,open:defOpen,accent}){
  const [open,setOpen]=useState(!!defOpen);
  const ac=accent||C.accent;
  return e("div",{style:{marginBottom:10,borderRadius:10,border:"1px solid "+(open?ac+"44":C.border),background:C.card,overflow:"hidden"}},
    e("button",{onClick:()=>setOpen(!open),style:{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"13px 14px",background:"none",border:"none",color:C.text,cursor:"pointer",textAlign:"left",fontSize:14,fontWeight:600,fontFamily:"inherit"}},
      e("span",{style:{fontSize:17}},icon),
      e("span",{style:{flex:1}},title),
      e("span",{style:{transform:open?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",fontSize:11,color:C.textMuted}},"▼")
    ),
    open&&e("div",{style:{padding:"0 14px 14px",lineHeight:1.6}},children)
  );
}

function ExRow({name,sets,reps,notes,safety,removed,replacement,phase,detail}){
  const [expanded,setExpanded]=useState(false);
  const sc=safety==="caution"?C.warning:safety==="danger"?C.danger:C.safe;
  if(removed){
    return e("div",{style:{padding:"9px 11px",marginBottom:5,borderRadius:8,background:C.dangerBg,border:"1px solid "+C.dangerBorder,opacity:0.8}},
      e("div",{style:{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}},
        e("span",{style:{textDecoration:"line-through",color:C.danger,fontSize:13,fontWeight:600}},name),
        Badge({color:C.danger,children:"REMOVED"})
      ),
      e("div",{style:{fontSize:11,color:C.danger}},"⚠ "+notes),
      replacement&&e("div",{style:{fontSize:11,color:C.safe,marginTop:3}},"✓ Replaced: "+replacement)
    );
  }
  return e("div",{
    onClick:()=>setExpanded(!expanded),
    style:{
      padding:"9px 11px",
      marginBottom:5,
      borderRadius:8,
      background:expanded?"#0f1629":C.bg,
      borderLeft:"3px solid "+sc,
      cursor:"pointer",
      transition:"background 0.2s"
    }
  },
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:7,flexWrap:"wrap",marginBottom:3}},
      e("div",{style:{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}},
        e("span",{style:{fontWeight:600,fontSize:13,color:C.text}},name),
        safety==="caution"&&Badge({color:C.warning,children:"MODIFIED"}),
        phase&&Badge({color:C.textMuted,children:"Wk "+phase})
      ),
      !expanded&&e("div",{style:{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.accent}},
        e("span",null,"tap for details →"),
        e("span",{style:{fontSize:12}},"ⓘ")
      )
    ),
    e("div",{style:{fontSize:12,color:C.textDim}},
      sets&&e("span",null,sets+" × "+reps),
      notes&&e("div",{style:{fontSize:11,color:safety==="caution"?C.warning:C.textMuted,marginTop:2}},notes)
    ),
    expanded&&detail&&e("div",{style:{marginTop:12,paddingTop:12,borderTop:"1px solid "+C.border,fontSize:11,lineHeight:1.6}},
      e("div",{style:{marginBottom:10}},
        e("div",{style:{fontWeight:700,color:C.accent,marginBottom:4,fontSize:10}},"📍 SETUP & POSITION"),
        e("div",{style:{color:C.textDim}},detail.setup)
      ),
      e("div",{style:{marginBottom:10}},
        e("div",{style:{fontWeight:700,color:C.safe,marginBottom:4,fontSize:10}},"🔄 HOW TO EXECUTE"),
        e("div",{style:{color:C.textDim}},detail.execution)
      ),
      e("div",{style:{marginBottom:10}},
        e("div",{style:{fontWeight:700,color:C.warning,marginBottom:4,fontSize:10}},"🛡️ NWB SAFETY CUES"),
        e("div",{style:{color:C.textDim}},detail.nwbCues)
      ),
      e("div",null,
        e("div",{style:{fontWeight:700,color:C.text,marginBottom:4,fontSize:10}},"🎯 WHY THIS EXERCISE"),
        e("div",{style:{color:C.textDim}},detail.why)
      )
    )
  );
}

function Callout({type,children}){
  const cfg={danger:{bg:C.dangerBg,border:C.dangerBorder,color:C.danger,icon:"🚫"},warning:{bg:C.warningBg,border:C.warningBorder,color:C.warning,icon:"⚠️"},safe:{bg:C.safeBg,border:C.safeBorder,color:C.safe,icon:"✅"},info:{bg:C.accentDim+"44",border:C.accentDim,color:C.accent,icon:"💡"}};
  const c=cfg[type]||cfg.info;
  return e("div",{style:{padding:"11px 13px",borderRadius:8,background:c.bg,border:"1px solid "+c.border,marginBottom:10,fontSize:12,lineHeight:1.6,color:c.color}},c.icon+" ",children);
}

function EqTable({rows}){
  return e("div",{style:{overflowX:"auto",marginBottom:10}},
    e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
      e("thead",null,e("tr",{style:{borderBottom:"2px solid "+C.accent+"44"}},
        e("th",{style:{padding:"7px 8px",textAlign:"left",color:C.accent,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:1}},"Exercise"),
        e("th",{style:{padding:"7px 8px",textAlign:"left",color:C.safe,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:1}},"Full Gym"),
        e("th",{style:{padding:"7px 8px",textAlign:"left",color:C.warning,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:1}},"Home")
      )),
      e("tbody",null,rows.map((r,i)=>e("tr",{key:i,style:{borderBottom:"1px solid "+C.border}},
        e("td",{style:{padding:"7px 8px",color:C.text,fontWeight:500}},r[0]),
        e("td",{style:{padding:"7px 8px",color:C.textDim}},r[1]),
        e("td",{style:{padding:"7px 8px",color:C.textDim}},r[2])
      )))
    )
  );
}

  );

      e("div",{style:{fontSize:10,fontWeight:700,color:p.color,textTransform:"uppercase"}},"Wk "+p.weeks),
      e("div",{style:{fontSize:10,color:phase===i?C.text:C.textMuted,marginTop:2}},p.name)

    SCHED.map((s,i)=>e("div",{key:i,style:{padding:"7px 3px",borderRadius:7,background:C.bg,border:"1px solid "+s.c+"33",textAlign:"center"}},

      e("div",{style:{fontSize:15,margin:"3px 0"}},s.i),
      e("div",{style:{fontSize:9,color:s.c,fontWeight:600}},s.t)
    ))
  );

  const ex = (props) => e(ExRow, { ...props, detail: EX_DETAILS[props.name] });

  // ===== TAB CONTENT =====
  let content;

  if(tab===0){
