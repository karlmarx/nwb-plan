function RestTimer({seconds, onClose}) {
  const [remaining, setRemaining] = useState(seconds);
  const intervalRef = useRef(null);

  useEffect(function() {
    intervalRef.current = setInterval(function() {
      setRemaining(function(r) {
        if (r <= 1) { clearInterval(intervalRef.current); return 0; }
        return r - 1;
      });
    }, 1000);
    return function() { clearInterval(intervalRef.current); };
  }, [seconds]);

  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;

  return e("div", {className:"rest-timer"},

// ===== PROGRAM CLOCK =====
// Program start: last Tuesday (Mar 17, 2026) at noon EDT = 16:00 UTC
const PROG_START = new Date("2026-03-17T16:00:00Z");
const PROG_DURATION = 42 * 24 * 60 * 60 * 1000; // 6 weeks in ms
const PROG_END = new Date(PROG_START.getTime() + PROG_DURATION);

function ProgressClock() {
  const [now, setNow] = useState(function(){ return new Date(); });
  const [countdown, setCountdown] = useState(false);
  const [flash, setFlash] = useState(false);
  const [minimized, setMinimized] = useState(false);

  useEffect(function() {
    var id = setInterval(function(){ setNow(new Date()); }, 1000);
    return function(){ clearInterval(id); };
  }, []);

  useEffect(function() {
    function onScroll() { if (window.scrollY > 20) setMinimized(true); }
    window.addEventListener("scroll", onScroll, {passive: true});
    return function(){ window.removeEventListener("scroll", onScroll); };
  }, []);

  var elapsed = now - PROG_START;
  var remaining = PROG_END - now;
  var progress = Math.min(1, Math.max(0, elapsed / PROG_DURATION));
  var pct = Math.round(progress * 100);
  var weekNum = Math.min(6, Math.floor(elapsed / (7*24*60*60*1000)) + 1);
  var totalDayNum = Math.min(42, Math.floor(elapsed / (24*60*60*1000)) + 1);

  function fmt(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    return {
      d: Math.floor(s / 86400),
      h: Math.floor((s % 86400) / 3600),
      m: Math.floor((s % 3600) / 60),
      s: s % 60
    };
  }

  var t = fmt(countdown ? remaining : elapsed);
  var pad = function(n){ return n < 10 ? "0"+n : ""+n; };

  // Color shifts green → blue → amber as program progresses
  var clr = progress < 0.33 ? C.safe : progress < 0.66 ? C.accent : C.warning;

  function handleClick() {
    if (minimized) { setMinimized(false); return; }

  }

  var unitStyle = {display:"flex", flexDirection:"column", alignItems:"center", gap:2, minWidth:46};
  var numStyle = {fontSize:28, fontWeight:800, fontVariantNumeric:"tabular-nums", color:clr, lineHeight:1, letterSpacing:"-1px"};

  var sepStyle = {fontSize:24, fontWeight:300, color:clr+"66", alignSelf:"flex-start", marginTop:4, lineHeight:1};
  var pctDisplay = countdown ? (100 - pct)+"% remaining" : pct+"% complete";

  if (minimized) {
    return e("div", {
      onClick: handleClick,
      style: {
        cursor:"pointer", marginBottom:12,
        borderRadius:10, padding:"6px 12px",
        background:"#111827", border:"1px solid "+clr+"33",
        display:"flex", alignItems:"center", justifyContent:"space-between"
      }
    },
      e("span", {style:{fontSize:10, fontWeight:700, color:clr}}, "W"+weekNum+"·D"+totalDayNum),
      e("span", {style:{fontSize:10, color:C.textMuted, fontVariantNumeric:"tabular-nums"}},
        t.d > 0 ? t.d+"d "+pad(t.h)+"h "+pad(t.m)+"m" : pad(t.h)+":"+pad(t.m)+":"+pad(t.s),
        " · "+pctDisplay+" "+(countdown ? "↓" : "↑")
      ),
      e("span", {style:{fontSize:9, color:C.textMuted}}, "tap to expand")
    );
