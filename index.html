// ===== HELPER: localStorage =====
function loadState(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function saveState(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function RestTimer({seconds, onClose}) {
  const [remaining, setRemaining] = useState(seconds);
  const intervalRef = useRef(null);

  useEffect(function() {
    intervalRef.current = setInterval(function() {
      setRemaining(function(r) {
        if (r <= 1) { clearInterval(intervalRef.current); return 0; }
        return r - 1;
      });
    }, 1000);
    return function() { clearInterval(intervalRef.current); };
  }, [seconds]);

  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;

  return e("div", {className:"rest-timer"},
    e("div", {className:"time", style: remaining === 0 ? {color:C.safe, animation:"pulse 1s infinite"} : {}},
      remaining === 0 ? "GO!" : (mins > 0 ? mins+":" : "") + (secs < 10 && mins > 0 ? "0" : "") + secs
    ),
    e("button", {onClick:onClose}, "✕ Close")
  );
}

// ===== PROGRAM CLOCK =====
// Program start: last Tuesday (Mar 17, 2026) at noon EDT = 16:00 UTC
const PROG_START = new Date("2026-03-17T16:00:00Z");
const PROG_DURATION = 42 * 24 * 60 * 60 * 1000; // 6 weeks in ms
const PROG_END = new Date(PROG_START.getTime() + PROG_DURATION);

function ProgressClock() {
  const [now, setNow] = useState(function(){ return new Date(); });
  const [countdown, setCountdown] = useState(false);
  const [flash, setFlash] = useState(false);
  const [minimized, setMinimized] = useState(false);

  useEffect(function() {
    var id = setInterval(function(){ setNow(new Date()); }, 1000);
    return function(){ clearInterval(id); };
  }, []);

  useEffect(function() {
    function onScroll() { if (window.scrollY > 20) setMinimized(true); }
    window.addEventListener("scroll", onScroll, {passive: true});
    return function(){ window.removeEventListener("scroll", onScroll); };
  }, []);

  var elapsed = now - PROG_START;
  var remaining = PROG_END - now;
  var progress = Math.min(1, Math.max(0, elapsed / PROG_DURATION));
  var pct = Math.round(progress * 100);
  var weekNum = Math.min(6, Math.floor(elapsed / (7*24*60*60*1000)) + 1);
  var totalDayNum = Math.min(42, Math.floor(elapsed / (24*60*60*1000)) + 1);

  function fmt(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    return {
      d: Math.floor(s / 86400),
      h: Math.floor((s % 86400) / 3600),
      m: Math.floor((s % 3600) / 60),
      s: s % 60
    };
  }

  var t = fmt(countdown ? remaining : elapsed);
  var pad = function(n){ return n < 10 ? "0"+n : ""+n; };

  // Color shifts green → blue → amber as program progresses
  var clr = progress < 0.33 ? C.safe : progress < 0.66 ? C.accent : C.warning;

  function handleClick() {
    if (minimized) { setMinimized(false); return; }
    setCountdown(function(v){ return !v; });
    setFlash(true);
    setTimeout(function(){ setFlash(false); }, 300);
  }

  var unitStyle = {display:"flex", flexDirection:"column", alignItems:"center", gap:2, minWidth:46};
  var numStyle = {fontSize:28, fontWeight:800, fontVariantNumeric:"tabular-nums", color:clr, lineHeight:1, letterSpacing:"-1px"};
  var lblStyle = {fontSize:8, fontWeight:700, color:C.textMuted, textTransform:"uppercase", letterSpacing:"1.5px"};
  var sepStyle = {fontSize:24, fontWeight:300, color:clr+"66", alignSelf:"flex-start", marginTop:4, lineHeight:1};
  var pctDisplay = countdown ? (100 - pct)+"% remaining" : pct+"% complete";

  if (minimized) {
    return e("div", {
      onClick: handleClick,
      style: {
        cursor:"pointer", marginBottom:12,
        borderRadius:10, padding:"6px 12px",
        background:"#111827", border:"1px solid "+clr+"33",
        display:"flex", alignItems:"center", justifyContent:"space-between"
      }
    },
      e("span", {style:{fontSize:10, fontWeight:700, color:clr}}, "W"+weekNum+"·D"+totalDayNum),
      e("span", {style:{fontSize:10, color:C.textMuted, fontVariantNumeric:"tabular-nums"}},
        t.d > 0 ? t.d+"d "+pad(t.h)+"h "+pad(t.m)+"m" : pad(t.h)+":"+pad(t.m)+":"+pad(t.s),
        " · "+pctDisplay+" "+(countdown ? "↓" : "↑")
      ),
      e("span", {style:{fontSize:9, color:C.textMuted}}, "tap to expand")
    );
  }

  return e("div", {
    onClick: handleClick,
    style: {
      cursor:"pointer", marginBottom:16,
      borderRadius:14,
      background: flash ? clr+"18" : "linear-gradient(135deg, #111827 0%, #0d1424 100%)",
      border:"1px solid "+clr+"55",
      boxShadow:"0 0 24px "+clr+"18, inset 0 1px 0 "+clr+"22",
      transition:"background 0.25s, box-shadow 0.25s",
      overflow:"hidden"
    }
  },
    // Header row
    e("div", {style:{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px 0"}},
      e("div", {style:{display:"flex", alignItems:"center", gap:6}},
        e("div", {style:{width:6, height:6, borderRadius:"50%", background:clr, boxShadow:"0 0 6px "+clr, animation:"pulse 2s infinite"}}),
        e("span", {style:{fontSize:10, fontWeight:700, color:clr, textTransform:"uppercase", letterSpacing:"1px"}},
          progress >= 1 ? "Program Complete" : "Week "+weekNum+" · Day "+totalDayNum+" of 42"
        )
      ),
      e("div", {style:{display:"flex", alignItems:"center", gap:6}},
        e("span", {style:{fontSize:9, color:C.textMuted, textTransform:"uppercase", letterSpacing:"1px"}},
          countdown ? "remaining" : "elapsed"
        ),
        e("div", {style:{padding:"2px 7px", borderRadius:4, background:clr+"22", border:"1px solid "+clr+"44", fontSize:9, fontWeight:700, color:clr}},
          countdown ? "↓" : "↑"
        )
      )
    ),
    // Time display
    e("div", {style:{display:"flex", alignItems:"center", justifyContent:"center", gap:0, padding:"10px 14px 8px"}},
      t.d > 0 && e("div", {style:unitStyle},
        e("div", {style:numStyle}, t.d),
        e("div", {style:lblStyle}, "days")
      ),
      t.d > 0 && e("div", {style:sepStyle}, ":"),
      e("div", {style:unitStyle},
        e("div", {style:numStyle}, pad(t.h)),
        e("div", {style:lblStyle}, "hrs")
      ),
      e("div", {style:sepStyle}, ":"),
      e("div", {style:unitStyle},
        e("div", {style:numStyle}, pad(t.m)),
        e("div", {style:lblStyle}, "min")
      ),
      e("div", {style:sepStyle}, ":"),
      e("div", {style:unitStyle},
        e("div", {style:numStyle}, pad(t.s)),
        e("div", {style:lblStyle}, "sec")
      )
    ),
    // Progress bar
    e("div", {style:{position:"relative", height:6, background:C.border, margin:"0 0 0"}},
      e("div", {style:{
        position:"absolute", left:0, top:0, height:"100%",
        width:(pct)+"%",
        background:"linear-gradient(90deg, "+clr+"99, "+clr+")",
        borderRadius:"0 3px 3px 0",
        boxShadow:"0 0 8px "+clr+"66",
        transition:"width 1s linear"
      }}),
      // Glowing tip
      pct > 0 && pct < 100 && e("div", {style:{
        position:"absolute", top:-1, width:4, height:8, borderRadius:2,
        background:clr, boxShadow:"0 0 6px "+clr,
        left:"calc("+pct+"% - 2px)",
        transition:"left 1s linear"
      }})
    ),
    // Footer
    e("div", {style:{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 14px 9px"}},
      e("span", {style:{fontSize:9, color:C.textMuted}}),
      e("span", {style:{fontSize:9, color:C.textMuted, textTransform:"uppercase", letterSpacing:"1px"}},
        pctDisplay+" · tap to toggle"
      ),
      e("span", {style:{fontSize:9, color:C.textMuted}})
    )
  );
}

function getTodayKey() {
  var d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

function NutritionSection({isOpen, onToggle}) {
  const todayKey = getTodayKey();
  const green = "#10b981";

  const _s = useState(function() {
    const all = loadState("nwb_nutrition", {});
    return all[todayKey] || {checks:{}, notes:{}, cardioType:"", cardioDuration:"", cardioSkipped:false};
  });
  const data = _s[0]; const setData = _s[1];

  const _h = useState(function(){
    const loaded = loadState("nwb_nutrition_history", {});
    // Prune entries older than 90 days
    const keys = Object.keys(loaded);
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 90);
    const cutoffKey = cutoff.toISOString().slice(0,10);
    keys.forEach(function(k) {
      if (k < cutoffKey) delete loaded[k];
    });
    return loaded;
  });
  const history = _h[0]; const setHistory = _h[1];

  const _d = useState(function(){ return loadState("nwb_nutrition_dismissed", {}); });
  const dismissed = _d[0]; const setDismissed = _d[1];

  const _hv = useState(false);
  const showHistory = _hv[0]; const setShowHistory = _hv[1];

  const _hd = useState(null);
  const historyDetail = _hd[0]; const setHistoryDetail = _hd[1];

  // Persist on change
  useEffect(function() {
    const all = loadState("nwb_nutrition", {});
    all[todayKey] = data;
    saveState("nwb_nutrition", all);
    // Update history record
    const checkedMeals = MEAL_IDS.filter(function(id){ return data.checks[id]; }).length;
    const checkedSupps = SUPP_IDS.filter(function(id){ return data.checks[id]; }).length;
    const perfect = checkedMeals >= 4 && checkedSupps >= 3;
    const partial = checkedMeals > 0 || checkedSupps > 0;
    setHistory(function(prev) {
      const h = Object.assign({}, prev);
      h[todayKey] = {perfect:perfect, partial:partial, meals:checkedMeals, supps:checkedSupps};
      saveState("nwb_nutrition_history", h);
      return h;
    });
  }, [data]);

  // Reset dismissed alerts on new app open (check dismissed date)
  useEffect(function() {
    if (dismissed._date !== todayKey) {
      setDismissed({_date: todayKey});
      saveState("nwb_nutrition_dismissed", {_date: todayKey});
    }
  }, []);

  const toggle = function(id) {
    setData(function(prev) {
      const c = Object.assign({}, prev.checks);
      c[id] = !c[id];
      return Object.assign({}, prev, {checks:c});
    });
  };

  const setNote = function(id, val) {
    setData(function(prev) {
      const n = Object.assign({}, prev.notes);
      n[id] = val;
      return Object.assign({}, prev, {notes:n});
    });
  };

  const setCardioType = function(val) {
    setData(function(prev) { return Object.assign({}, prev, {cardioType:val}); });
  };

  const setCardioDuration = function(val) {
    setData(function(prev) { return Object.assign({}, prev, {cardioDuration:val}); });
  };

  const skipCardio = function() {
    setData(function(prev) { return Object.assign({}, prev, {cardioSkipped:!prev.cardioSkipped}); });
  };

  const dismissAlert = function(key) {
    const d = Object.assign({}, dismissed);
    d[key] = true;
    d._date = todayKey;
    setDismissed(d);
    saveState("nwb_nutrition_dismissed", d);
  };

  // Counts
  const checkedMeals = MEAL_IDS.filter(function(id){ return data.checks[id]; }).length;
  const checkedSupps = SUPP_IDS.filter(function(id){ return data.checks[id]; }).length;
  const totalChecked = NUTRITION_ITEMS.filter(function(it){ return it.id === "cardio" ? (data.checks.cardio || data.cardioSkipped) : data.checks[it.id]; }).length;
  const totalItems = NUTRITION_ITEMS.length;

  // Streak calculation
  let streak = 0;
  let bestStreak = 0;
  const d2 = new Date();
  d2.setDate(d2.getDate() - 1); // start from yesterday for completed days
  while (true) {
    const k = d2.getFullYear()+"-"+String(d2.getMonth()+1).padStart(2,"0")+"-"+String(d2.getDate()).padStart(2,"0");
    if (history[k] && history[k].perfect) { streak++; d2.setDate(d2.getDate()-1); }
    else break;
  }
  // Include today if perfect
  if (history[todayKey] && history[todayKey].perfect) streak++;
  // Best streak from all history
  const keys = Object.keys(history).sort();
  let run = 0;
  for (let si = 0; si < keys.length; si++) {
    if (history[keys[si]] && history[keys[si]].perfect) { run++; if (run > bestStreak) bestStreak = run; }
