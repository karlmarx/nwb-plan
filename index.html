// ===== STATELESS COMPONENTS =====

function Badge({color, children}) {
  return e("span", {
    style: {
      display: "inline-block",
      padding: "2px 7px",
      borderRadius: 4,
      fontSize: 10,
      fontWeight: 700,
      letterSpacing: "0.5px",
      textTransform: "uppercase",
      background: color + "22",
      color: color,
      border: "1px solid " + color + "44"
    }
  }, children);
}

function Section({title, icon, children, isOpen, onToggle, accent}) {
  const ac = accent || C.accent;
  return e("div", {
    style: {
      marginBottom: 10,
      borderRadius: 10,
      border: "1px solid " + (isOpen ? ac + "44" : C.border),
      background: C.card,
      overflow: "hidden"
    }
  },
    e("button", {
      onClick: onToggle,
      style: {
        width: "100%",
        display: "flex",
        alignItems: "center",
        gap: 9,
        padding: "13px 14px",
        background: "none",
        border: "none",
        color: C.text,
        cursor: "pointer",
        textAlign: "left",
        fontSize: 14,
        fontWeight: 600,
        fontFamily: "inherit"
      }
    },
      e("span", {style: {fontSize: 17}}, icon),
      e("span", {style: {flex: 1}}, title),
      e("span", {
        style: {
          transform: isOpen ? "rotate(180deg)" : "rotate(0deg)",
          transition: "transform 0.2s",
          fontSize: 11,
          color: C.textMuted
        }
      }, "▼")
    ),
    isOpen && e("div", {style: {padding: "0 14px 14px", lineHeight: 1.6}}, children)
  );
}

function ExRow({name, sets, reps, notes, safety, removed, replacement, phase, isExpanded, onToggle}) {
  const sc = safety === "caution" ? C.warning : safety === "danger" ? C.danger : C.safe;
  const detail = EX_DETAILS[name];
  
  if (removed) {
    return e("div", {
      style: {
        padding: "9px 11px",
        marginBottom: 5,
        borderRadius: 8,
        background: C.dangerBg,
        border: "1px solid " + C.dangerBorder,
        opacity: 0.8
      }
    },
      e("div", {style: {display: "flex", alignItems: "center", gap: 7, marginBottom: 3}},
        e("span", {style: {textDecoration: "line-through", color: C.danger, fontSize: 13, fontWeight: 600}}, name),
        e(Badge, {color: C.danger, children: "REMOVED"})
      ),
      e("div", {style: {fontSize: 11, color: C.danger}}, "⚠ " + notes),
      replacement && e("div", {style: {fontSize: 11, color: C.safe, marginTop: 3}}, "✓ Replaced: " + replacement)
    );
  }

  return e("div", {
    onClick: onToggle,
    style: {
      padding: "9px 11px",
      marginBottom: 5,
      borderRadius: 8,
      background: isExpanded ? "#0f1629" : C.bg,
      borderLeft: "3px solid " + sc,
      cursor: "pointer",
      transition: "background 0.2s"
    }
  },
    e("div", {style: {display: "flex", alignItems: "center", justifyContent: "space-between", gap: 7, flexWrap: "wrap", marginBottom: 3}},
      e("div", {style: {display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap"}},
        e("span", {style: {fontWeight: 600, fontSize: 13, color: C.text}}, name),
        safety === "caution" && e(Badge, {color: C.warning, children: "MODIFIED"}),
        phase && e(Badge, {color: C.textMuted, children: "Wk " + phase})
      ),
      !isExpanded && e("div", {style: {display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: C.accent}},
        e("span", null, "tap for details →"),
        e("span", {style: {fontSize: 12}}, "ⓘ")
      )
    ),
    e("div", {style: {fontSize: 12, color: C.textDim}},
      sets && e("span", null, sets + " × " + reps),
      notes && e("div", {style: {fontSize: 11, color: safety === "caution" ? C.warning : C.textMuted, marginTop: 2}}, notes)
    ),
    isExpanded && detail && e("div", {style: {marginTop: 12, paddingTop: 12, borderTop: "1px solid " + C.border, fontSize: 11, lineHeight: 1.6}},
      e("div", {style: {marginBottom: 10}},
        e("div", {style: {fontWeight: 700, color: C.accent, marginBottom: 4, fontSize: 10}}, "📍 SETUP & POSITION"),
        e("div", {style: {color: C.textDim}}, detail.setup)
      ),
      e("div", {style: {marginBottom: 10}},
        e("div", {style: {fontWeight: 700, color: C.safe, marginBottom: 4, fontSize: 10}}, "🔄 HOW TO EXECUTE"),
        e("div", {style: {color: C.textDim}}, detail.execution)
      ),
      e("div", {style: {marginBottom: 10}},
        e("div", {style: {fontWeight: 700, color: C.warning, marginBottom: 4, fontSize: 10}}, "🛡️ NWB SAFETY CUES"),
        e("div", {style: {color: C.textDim}}, detail.nwbCues)
      ),
      e("div", null,
        e("div", {style: {fontWeight: 700, color: C.text, marginBottom: 4, fontSize: 10}}, "🎯 WHY THIS EXERCISE"),
        e("div", {style: {color: C.textDim}}, detail.why)
      )
    )
  );
}

function Callout({type, children}) {
  const cfg = {
    danger: {bg: C.dangerBg, border: C.dangerBorder, color: C.danger, icon: "🚫"},
    warning: {bg: C.warningBg, border: C.warningBorder, color: C.warning, icon: "⚠️"},
    safe: {bg: C.safeBg, border: C.safeBorder, color: C.safe, icon: "✅"},
    info: {bg: C.accentDim + "44", border: C.accentDim, color: C.accent, icon: "💡"}
  };
  const c = cfg[type] || cfg.info;
  return e("div", {
    style: {
      padding: "11px 13px",
      borderRadius: 8,
      background: c.bg,
      border: "1px solid " + c.border,
      marginBottom: 10,
      fontSize: 12,
      lineHeight: 1.6,
      color: c.color
    }
  }, c.icon + " ", children);
}

function EqTable({rows}) {
  return e("div", {style: {overflowX: "auto", marginBottom: 10}},
    e("table", {style: {width: "100%", borderCollapse: "collapse", fontSize: 12}},
      e("thead", null, e("tr", {style: {borderBottom: "2px solid " + C.accent + "44"}},
        e("th", {style: {padding: "7px 8px", textAlign: "left", color: C.accent, fontWeight: 700, fontSize: 10, textTransform: "uppercase"}}, "Exercise"),
        e("th", {style: {padding: "7px 8px", textAlign: "left", color: C.safe, fontWeight: 700, fontSize: 10, textTransform: "uppercase"}}, "Full Gym"),
        e("th", {style: {padding: "7px 8px", textAlign: "left", color: C.warning, fontWeight: 700, fontSize: 10, textTransform: "uppercase"}}, "Home")
      )),
      e("tbody", null, rows.map((r, i) => e("tr", {key: "row-" + i, style: {borderBottom: "1px solid " + C.border}},
        e("td", {style: {padding: "7px 8px", color: C.text, fontWeight: 500}}, r[0]),
        e("td", {style: {padding: "7px 8px", color: C.textDim}}, r[1]),
        e("td", {style: {padding: "7px 8px", color: C.textDim}}, r[2])
      )))
    )
  );
}

  const toggleExercise = (n) => setExpandedExercises(s => ({...s, [n]: !s[n]}));

  const tabs = ["Schedule", "Workouts", "Cardio", "Core", "Equip", "Safety"];

  let content = null;
  switch (tab) {
    case 0: // Schedule
      content = e("div", null,
        e("div", {style: {display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3, marginBottom: 14}},
          SCHED.map((s, i) => e("div", {key: "day-" + i, style: {padding: "7px 3px", borderRadius: 7, background: C.card, border: "1px solid " + s.c + "33", textAlign: "center"}},
            e("div", {style: {fontSize: 9, fontWeight: 700, color: C.textMuted, textTransform: "uppercase"}}, s.d),
            e("div", {style: {fontSize: 15, margin: "3px 0"}}, s.i),
            e("div", {style: {fontSize: 9, color: s.c, fontWeight: 600}}, s.t)
          ))
        ),
        e(Section, {
          title: "Weekly Overview",
          icon: "📅",
          isOpen: !!openSections["Weekly Overview"],
          onToggle: () => toggleSection("Weekly Overview")
        },
          e("div", {style: {fontSize: 12, color: C.textDim, lineHeight: 1.7}},
            e("p", null, "6-day PPL split. Cardio 3-4×/week. Sunday = active recovery."),
            e("div", {style: {display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginTop: 10}},
              [{l:"Push", d:"Floor press, OH press, chest, triceps"}, {l:"Pull", d:"Pulldowns, rows, biceps"}, {l:"Legs", d:"Right leg only"}, {l:"Core", d:"McGill Big 3 every session"}].map((info, i) =>
                e("div", {key: "ov-" + i, style: {padding: "9px", borderRadius: 7, background: C.bg, border: "1px solid " + C.border}},
                  e("div", {style: {fontSize: 11, fontWeight: 700, color: C.accent}}, info.l),
                  e("div", {style: {fontSize: 10, color: C.textMuted, marginTop: 2}}, info.d)
                )
              )
            )
          )
        ),
        e(Section, {
          title: "Phase Progression",
          icon: "📈",
          isOpen: !!openSections["Phase Progression"],
          onToggle: () => toggleSection("Phase Progression")
        },
          PHASES.map((p, i) =>
            e("div", {
              key: "prog-" + i,
              onClick: () => setPhase(i),
              style: {
                padding: "11px",
                marginBottom: 7,
                borderRadius: 8,
                background: phase === i ? p.color + "11" : C.bg,
                border: "1px solid " + (phase === i ? p.color + "44" : C.border),
                cursor: "pointer"
              }
            },
              e("div", {style: {fontWeight: 700, color: p.color, fontSize: 13}}, "Weeks " + p.weeks + ": " + p.name),
              e("div", {style: {fontSize: 11, color: C.textMuted, marginTop: 3}},
                i === 0 ? "Lower load, high reps (10-15). Adaptation phase." :
                i === 1 ? "Increase load (80% 1RM). 4-sec eccentrics on legs." :
                "Peak intensity. Prepare for WB transition."
              )
            )
          )
        ),
        e(Section, {
          title: "Cross-Education Protocol",
          icon: "🧠",
          isOpen: !!openSections["Cross-Education Protocol"],
          onToggle: () => toggleSection("Cross-Education Protocol")
        },
          e(Callout, {type: "info", children: "Meta-analyses confirm ~16% contralateral strength preservation. Load (≥80% 1RM) + Eccentric emphasis (~17.7% transfer)."}),
          e("div", {style: {fontSize: 12, color: C.textDim, lineHeight: 1.7}},
            e("p", {style: {margin: "0 0 6px", fontWeight: 600, color: C.text}}, "Right leg training rules:"),
            ["Intensity: ≥80% 1RM (Wks 3+)", "Tempo: 4-second eccentric", "Rest: 2+ minutes", "ROM: <90° hip flexion (FAI protection)"].map((rule, i) =>
              e("p", {key: "rule-" + i}, "• " + rule)
            )
          )
        )
      );
      break;

    case 1: // Workouts
      content = e("div", null,
        e(Section, {
          title: "Push A — Strength",
          icon: "💪",
          accent: "#38bdf8",
          isOpen: !!openSections["Push A — Strength"],
          onToggle: () => toggleSection("Push A — Strength")
        },
          e(ExRow, {name: "Barbell Floor Press", sets: 4, reps: "5-6", safety: "safe", isExpanded: !!expandedExercises["Barbell Floor Press"], onToggle: () => toggleExercise("Barbell Floor Press")}),
          e(ExRow, {name: "Seated DB OH Press", sets: 4, reps: "6-8", safety: "safe", isExpanded: !!expandedExercises["Seated DB OH Press"], onToggle: () => toggleExercise("Seated DB OH Press")}),
          e(ExRow, {name: "Incline DB Press + Lat Raises", sets: 3, reps: "8-10 / 12-15", safety: "safe", isExpanded: !!expandedExercises["Incline DB Press + Lat Raises"], onToggle: () => toggleExercise("Incline DB Press + Lat Raises")}),
          e(ExRow, {name: "Lying Skull Crushers", sets: 3, reps: "10-12", safety: "safe", isExpanded: !!expandedExercises["Lying Skull Crushers"], onToggle: () => toggleExercise("Lying Skull Crushers")}),
          e(ExRow, {name: "McGill Curl-Up", sets: 3, reps: "10 (5s hold)", safety: "safe", isExpanded: !!expandedExercises["McGill Curl-Up"], onToggle: () => toggleExercise("McGill Curl-Up")})
        ),
        e(Section, {
          title: "Push B — Volume",
          icon: "💪",
          accent: "#38bdf8",
          isOpen: !!openSections["Push B — Volume"],
          onToggle: () => toggleSection("Push B — Volume")
        },
          e(ExRow, {name: "DB Floor Press", sets: 4, reps: "8-10", safety: "safe", isExpanded: !!expandedExercises["DB Floor Press"], onToggle: () => toggleExercise("DB Floor Press")}),
          e(ExRow, {name: "Landmine Press (1-arm, seated)", sets: 3, reps: "10-12", safety: "safe", isExpanded: !!expandedExercises["Landmine Press (1-arm, seated)"], onToggle: () => toggleExercise("Landmine Press (1-arm, seated)")}),
          e(ExRow, {name: "Cable Chest Fly", sets: 3, reps: "12-15", safety: "safe", isExpanded: !!expandedExercises["Cable Chest Fly"], onToggle: () => toggleExercise("Cable Chest Fly")}),
          e(ExRow, {name: "OH Triceps Extension", sets: 3, reps: "10-12", safety: "safe", isExpanded: !!expandedExercises["OH Triceps Extension"], onToggle: () => toggleExercise("OH Triceps Extension")}),
          phase >= 1 && e(ExRow, {name: "Mechanical Drop Set", sets: 1, reps: "8+8+8", phase: "3-6", safety: "safe", isExpanded: !!expandedExercises["Mechanical Drop Set"], onToggle: () => toggleExercise("Mechanical Drop Set")}),
          e(ExRow, {name: "Side Plank", sets: 3, reps: "30s/side", safety: "safe", isExpanded: !!expandedExercises["Side Plank"], onToggle: () => toggleExercise("Side Plank")})
        ),
        e(Section, {
          title: "Pull A — Strength",
          icon: "🔗",
          accent: "#a78bfa",
          isOpen: !!openSections["Pull A — Strength"],
          onToggle: () => toggleSection("Pull A — Strength")
        },
          e(ExRow, {name: "Lat Pulldown (Wide)", sets: 4, reps: "6-8", safety: "safe", isExpanded: !!expandedExercises["Lat Pulldown (Wide)"], onToggle: () => toggleExercise("Lat Pulldown (Wide)")}),
          e(ExRow, {name: "Chest-Supported DB Row", sets: 4, reps: "6-8", safety: "safe", isExpanded: !!expandedExercises["Chest-Supported DB Row"], onToggle: () => toggleExercise("Chest-Supported DB Row")}),
          e(ExRow, {name: "Seated Cable Row", sets: 3, reps: "10-12", safety: "caution", notes: "No forward lean.", isExpanded: !!expandedExercises["Seated Cable Row"], onToggle: () => toggleExercise("Seated Cable Row")}),
          e(ExRow, {name: "Seated Face Pulls", sets: 3, reps: "15-20", safety: "safe", isExpanded: !!expandedExercises["Seated Face Pulls"], onToggle: () => toggleExercise("Seated Face Pulls")}),
          e(ExRow, {name: "Preacher Curls", sets: 3, reps: "8-10", safety: "safe", isExpanded: !!expandedExercises["Preacher Curls"], onToggle: () => toggleExercise("Preacher Curls")}),
          e(ExRow, {name: "Pallof Press", sets: 3, reps: "10/side", safety: "safe", isExpanded: !!expandedExercises["Pallof Press"], onToggle: () => toggleExercise("Pallof Press")})
        ),
        e(Section, {
          title: "Pull B — Volume",
          icon: "🔗",
          accent: "#a78bfa",
          isOpen: !!openSections["Pull B — Volume"],
          onToggle: () => toggleSection("Pull B — Volume")
        },
          e(ExRow, {name: "Neutral Grip Pulldown", sets: 4, reps: "10-12", safety: "safe", isExpanded: !!expandedExercises["Neutral Grip Pulldown"], onToggle: () => toggleExercise("Neutral Grip Pulldown")}),
          e(ExRow, {name: "One-Arm Cable Row", sets: 3, reps: "10-12", safety: "caution", isExpanded: !!expandedExercises["One-Arm Cable Row"], onToggle: () => toggleExercise("One-Arm Cable Row")}),
          e(ExRow, {name: "Reverse Fly", sets: 3, reps: "12-15", safety: "safe", isExpanded: !!expandedExercises["Reverse Fly"], onToggle: () => toggleExercise("Reverse Fly")}),
          e(ExRow, {name: "Hammer Curls", sets: 3, reps: "10-12", safety: "safe", isExpanded: !!expandedExercises["Hammer Curls"], onToggle: () => toggleExercise("Hammer Curls")}),
          e(ExRow, {name: "Incline DB Curl", sets: 3, reps: "10-12", safety: "safe", isExpanded: !!expandedExercises["Incline DB Curl"], onToggle: () => toggleExercise("Incline DB Curl")}),
          e(ExRow, {name: "Bird-Dog", sets: 3, reps: "8/side", safety: "safe", isExpanded: !!expandedExercises["Bird-Dog"], onToggle: () => toggleExercise("Bird-Dog")})
        ),
        e(Section, {
          title: "Legs A — Right Leg (Cross-Ed)",
          icon: "🦵",
          accent: "#10b981",
          isOpen: !!openSections["Legs A — Right Leg (Cross-Ed)"],
          onToggle: () => toggleSection("Legs A — Right Leg (Cross-Ed)")
        },
          e(Callout, {type: "warning", children: "Capped at <90° hip flexion for FAI/Labral protection."}),
          e(ExRow, {name: "SL Leg Press (Right)", sets: 4, reps: phase === 0 ? 12 : 6, safety: "caution", notes: "Foot HIGH on plate.", isExpanded: !!expandedExercises["SL Leg Press (Right)"], onToggle: () => toggleExercise("SL Leg Press (Right)")}),
          e(ExRow, {name: "SL Glute Bridge (Right)", sets: 4, reps: 12, safety: "safe", isExpanded: !!expandedExercises["SL Glute Bridge (Right)"], onToggle: () => toggleExercise("SL Glute Bridge (Right)")}),
          e(ExRow, {name: "Prone Ham Curl (Right)", sets: 3, reps: 12, safety: "safe", isExpanded: !!expandedExercises["Prone Ham Curl (Right)"], onToggle: () => toggleExercise("Prone Ham Curl (Right)")}),
          e(ExRow, {name: "Isometric Quad Sets (Left)", sets: 3, reps: "15x5s", safety: "safe", isExpanded: !!expandedExercises["Isometric Quad Sets (Left)"], onToggle: () => toggleExercise("Isometric Quad Sets (Left)")}),
          e(ExRow, {name: "Ankle Pumps (Left)", sets: 3, reps: 20, safety: "safe", isExpanded: !!expandedExercises["Ankle Pumps (Left)"], onToggle: () => toggleExercise("Ankle Pumps (Left)")}),
          e(ExRow, {name: "Dead Bug (R leg only)", sets: 3, reps: 12, safety: "safe", isExpanded: !!expandedExercises["Dead Bug (R leg only)"], onToggle: () => toggleExercise("Dead Bug (R leg only)")}),
          e("div", {style: {marginTop: 10, paddingTop: 10, borderTop: "1px solid " + C.border}},
            e(ExRow, {removed: true, name: "Pistol Squats", notes: "Dangerous for labrum."}),
            e(ExRow, {removed: true, name: "Bulgarian Split Squat", notes: "Exceeds 90° flexion."})
          )
        ),
        e(Section, {
          title: "Legs B — Right Posterior Chain",
          icon: "🦵",
          accent: "#10b981",
          isOpen: !!openSections["Legs B — Right Posterior Chain"],
          onToggle: () => toggleSection("Legs B — Right Posterior Chain")
        },
          e(ExRow, {name: "Low-Box Step-Up (Right)", sets: 3, reps: 10, safety: "caution", notes: "Box BELOW knee.", isExpanded: !!expandedExercises["Low-Box Step-Up (Right)"], onToggle: () => toggleExercise("Low-Box Step-Up (Right)")}),
          e(ExRow, {name: "SL Hip Thrust (Right)", sets: 3, reps: 12, safety: "safe", isExpanded: !!expandedExercises["SL Hip Thrust (Right)"], onToggle: () => toggleExercise("SL Hip Thrust (Right)")}),
          e(ExRow, {name: "Nordic Ham Curl", sets: 3, reps: 6, safety: "safe", isExpanded: !!expandedExercises["Nordic Ham Curl"], onToggle: () => toggleExercise("Nordic Ham Curl")}),
          e(ExRow, {name: "Standing Calf Raise (R)", sets: 4, reps: 15, safety: "safe", isExpanded: !!expandedExercises["Standing Calf Raise (R)"], onToggle: () => toggleExercise("Standing Calf Raise (R)")}),
          e(ExRow, {name: "Stir the Pot", sets: 3, reps: 8, safety: "safe", isExpanded: !!expandedExercises["Stir the Pot"], onToggle: () => toggleExercise("Stir the Pot")}),
          e("div", {style: {marginTop: 10, paddingTop: 10, borderTop: "1px solid " + C.border}},
            e(ExRow, {removed: true, name: "Seated Ham Curl", notes: "Compresses tendinopathy."})
          )
        ),
        e(Section, {
          title: "Recovery (Sunday)",
          icon: "🧘",
          isOpen: !!openSections["Recovery (Sunday)"],
          onToggle: () => toggleSection("Recovery (Sunday)")
        },
          e(ExRow, {name: "Arm Ergometer", reps: "20 min", safety: "safe", isExpanded: !!expandedExercises["Arm Ergometer"], onToggle: () => toggleExercise("Arm Ergometer")}),
          e(ExRow, {name: "Upper Body Stretching", reps: "10 min", safety: "caution", notes: "NO hamstring stretching.", isExpanded: !!expandedExercises["Upper Body Stretching"], onToggle: () => toggleExercise("Upper Body Stretching")}),
          e(ExRow, {name: "T-Spine Mobility", reps: "5 min", safety: "safe", isExpanded: !!expandedExercises["T-Spine Mobility"], onToggle: () => toggleExercise("T-Spine Mobility")})
        )
      );
      break;

    case 2: // Cardio
      content = e("div", null,
        e(Section, {
          title: "Cardio Priority Ranking",
          icon: "❤️",
          isOpen: !!openSections["Cardio Priority Ranking"],
          onToggle: () => toggleSection("Cardio Priority Ranking")
        },
          e(Callout, {type: "info", children: "Ranked by safety. Arm bike is gold standard."}),
          [{rank:1, name:"Arm Bike (UBE)", safety:"safe", desc:"Zero hip involvement. AAPM&R recommended."}, {rank:2, name:"Seated Battle Ropes", safety:"safe", desc:"Core dominant. No hip flexors."}, {rank:3, name:"Seated SkiErg", safety:"caution", desc:"Light only. Minimize trunk flexion."}].map((c, i) =>
            e("div", {key: "cardio-" + i, style: {padding: 12, marginBottom: 9, borderRadius: 9, background: C.card, border: "1px solid " + (c.safety === "safe" ? C.safeBorder : C.warningBorder)}},
              e("div", {style: {display: "flex", alignItems: "center", gap: 7, marginBottom: 5}},
                e("span", {style: {display: "inline-flex", alignItems: "center", justifyContext: "center", width: 22, height: 22, borderRadius: 11, background: C.accent + "22", color: C.accent, fontSize: 11, fontWeight: 800, textAlign: "center"}}, "#" + c.rank),
                e("span", {style: {fontWeight: 700, fontSize: 13, color: C.text}}, c.name),
                e(Badge, {color: c.safety === "safe" ? C.safe : C.warning, children: c.safety.toUpperCase()})
              ),
              e("div", {style: {fontSize: 11, color: C.textDim}}, c.desc)
            )
          )
        ),
        e(Section, {
          title: "Weekly Cardio Schedule",
          icon: "📆",
          isOpen: !!openSections["Weekly Cardio Schedule"],
          onToggle: () => toggleSection("Weekly Cardio Schedule")
        },
          e(EqTable, {rows: [["Mon", "Arm Bike 25m", "Steady"], ["Wed", "Battle Ropes", "Tabata"], ["Fri", "Arm Bike", "Intervals"], ["Sat", "SkiErg 15m", "Light"], ["Sun", "Arm Bike", "Easy"]]})
        )
      );
      break;

    case 3: // Core
      content = e("div", null,
        e(Section, {
          title: "Core Safety Rules",
          icon: "🛡️",
          isOpen: !!openSections["Core Safety Rules"],
          onToggle: () => toggleSection("Core Safety Rules")
        },
          e(Callout, {type: "danger", children: "ZERO spinal flexion under load. NO sit-ups."}),
          e(Callout, {type: "danger", children: "ZERO active left hip flexion. Protects fracture."})
        ),
        e(Section, {
          title: "Safe Core Exercises",
          icon: "✅",
          isOpen: !!openSections["Safe Core Exercises"],
          onToggle: () => toggleSection("Safe Core Exercises")
        },
          [{name:"McGill Curl-Up", target:"Abs"}, {name:"Side Plank", target:"Obliques"}, {name:"Bird-Dog", target:"Back"}, {name:"Pallof Press", target:"Core"}, {name:"Dead Bug (R leg)", target:"Deep Core"}, {name:"Stir the Pot", target:"Stability"}].map((c, i) =>
            e("div", {key: "core-" + i, style: {padding: 10, marginBottom: 7, borderRadius: 8, background: C.card, borderLeft: "3px solid " + C.safe}},
              e("div", {style: {fontWeight: 700, fontSize: 13, color: C.text}}, c.name),
              e(Badge, {color: C.safe, children: c.target})
            )
          )
        ),
        e(Section, {
          title: "Removed Core",
          icon: "🚫",
          isOpen: !!openSections["Removed Core"],
          onToggle: () => toggleSection("Removed Core")
        },
          [{n:"Russian Twists", r:"Disc danger."}, {n:"Sit-Ups", r:"Spine load."}, {n:"Leg Raises", r:"Fracture danger."}].map((rem, i) =>
            e(ExRow, {key: "remc-" + i, removed: true, name: rem.n, notes: rem.r})
          )
        )
      );
      break;

    case 4: // Equip
      content = e("div", null,
        e(Section, {
          title: "Cardio Alternatives",
          icon: "❤️",
          isOpen: !!openSections["Cardio Alternatives"],
          onToggle: () => toggleSection("Cardio Alternatives")
        },
          e(EqTable, {rows: [["Primary", "Arm Bike", "Seated Ropes"], ["Secondary", "Mini Arm Bike", "Punching"]]})
        ),
        e(Section, {
          title: "Weight Alternatives",
          icon: "💪",
          isOpen: !!openSections["Weight Alternatives"],
          onToggle: () => toggleSection("Weight Alternatives")
        },
          e(EqTable, {rows: [["Floor Press", "Barbell", "DBs + Mat"], ["Lat Pulldown", "Cable", "Bands"], ["Leg Press", "Machine", "Wall Sit"]]})
        )
      );
      break;

    case 5: // Safety
      content = e("div", null,
        e(Section, {
          title: "Injury Status",
          icon: "🩻",
          isOpen: !!openSections["Injury Status"],
          onToggle: () => toggleSection("Injury Status")
        },
          [{n:"Fracture", r:"Strict NWB 6+ weeks. Zero flexor fire."}, {n:"FAI/Labral", r:"Stop before 90° flexion. No clicking."}, {n:"Tendinosis", r:"HSR protocol (3s/1s/3s tempo)."}, {n:"L4-L5", r:"Zero flexion/rotation under load."}].map((inj, i) =>
            e("div", {key: "inj-" + i, style: {padding: 10, marginBottom: 7, borderRadius: 8, background: C.card, borderLeft: "3px solid " + C.warning}},
              e("div", {style: {fontWeight: 700, fontSize: 13, color: C.warning}}, inj.n),
              e("div", {style: {fontSize: 11, marginTop: 3, color: C.textDim}}, inj.r)
            )
          )
        ),
        e(Section, {
          title: "Absolute Stop Signals",
          icon: "🚨",
          isOpen: !!openSections["Absolute Stop Signals"],
          onToggle: () => toggleSection("Absolute Stop Signals")
        },
          e(Callout, {type: "danger", children: "Stop and contact MD if:"}),
          ["Groin pain", "Hip clicking/catching", "Pain >24h after workout", "Radiating leg pain"].map((s, i) =>
            e("p", {key: "s-" + i, style: {fontSize: 12, color: C.textDim}}, "• " + s)
          )
        )
      );
      break;
  }

  return e("div", {style: {maxWidth: 500, margin: "0 auto", padding: "0 10px 40px", minHeight: "100vh", background: C.bg}},
    e("div", {style: {padding: "30px 0 20px", textAlign: "center"}},
      e("h1", {style: {fontSize: 24, fontWeight: 800, letterSpacing: "-0.5px", color: C.white}}, "NWB Workout Plan"),
      e("div", {style: {fontSize: 12, color: C.textMuted, marginTop: 5}}, "MRI-Adjusted PPL • Left Hip NWB")
    ),
    e("div", {style: {display: "flex", gap: 5, marginBottom: 15}},
      PHASES.map((p, i) => e("div", {
        key: i,
        onClick: () => setPhase(i),
        style: {
          flex: 1,
          padding: 10,
          borderRadius: 8,
          background: phase === i ? p.color + "22" : C.card,
          border: "1px solid " + (phase === i ? p.color : C.border),
          textAlign: "center",
          cursor: "pointer"
        }
      },
        e("div", {style: {fontSize: 10, fontWeight: 700, color: p.color}}, "WK " + p.weeks),
        e("div", {style: {fontSize: 10, color: phase === i ? C.text : C.textMuted}}, p.name)
      ))
    ),
    e("div", {style: {display: "flex", gap: 2, marginBottom: 20, overflowX: "auto", paddingBottom: 5}},
      tabs.map((t, i) => e("button", {
        key: t,
        onClick: () => setTab(i),
        style: {
          flex: 1,
          minWidth: 75,
          padding: "10px 5px",
          background: tab === i ? C.accent + "22" : "none",
          border: "1px solid " + (tab === i ? C.accent : C.border),
          color: tab === i ? C.accent : C.textMuted,
          borderRadius: 8,
          fontSize: 11,
          fontWeight: 600,
          cursor: "pointer",
          fontFamily: "inherit"
        }
      }, t))
    ),
    content,
    e("div", {
      style: {
        marginTop: 30,
        padding: 15,
        borderRadius: 10,
        background: C.dangerBg,
        border: "1px solid " + C.dangerBorder,
        fontSize: 11,
        textAlign: "center",
        color: C.danger
      }
    },
      e("b", null, "Medical Disclaimer:"), " Confirm all exercises with your PT/Orthopedic Surgeon. Groin pain = Absolute Stop."
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(e(App));
  </script>
</body>
</html>
