name: Playwright Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: astral-sh/setup-uv@v6

      - name: Install Node dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FEATURE_AI_SUGGESTIONS: "false"

      - name: Install Playwright browsers
        run: uv run --python 3.14 --with pytest --with pytest-playwright --with playwright python -m playwright install chromium --with-deps

      - name: Run Playwright tests
        run: |
          npm run start &
          SERVER_PID=$!

          # Wait up to 60s for server to be ready
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Server did not start in time"
              exit 1
            fi
            sleep 1
          done

          uv run --python 3.14 --with pytest --with pytest-playwright --with playwright pytest e2e/ -v --tracing=retain-on-failure --output=test-results

          kill $SERVER_PID || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: test-results/
          retention-days: 14
